# config.ini — Oracle ADB-Free 26ai container configuration
# Place this file in the same directory as run-adb-26ai.sh and setup-for-adb-26ai.sh

# ─────────────────────────────────────────────
# ORACLE CONTAINER REGISTRY
# Accept the licence for Database → adb-free at https://container-registry.oracle.com
# Leave empty to attempt unauthenticated pull (may work for free-tier images).
# ─────────────────────────────────────────────
ORACLE_REGISTRY_USER=
ORACLE_REGISTRY_PASSWORD=

# ─────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────
# Oracle ADB-Free 26ai — bundles ORDS and APEX; no separate ORDS container needed.
# this one requires login 
# DOCKER_IMAGE=container-registry.oracle.com/database/adb-free:latest-26ai
# this one works without login (as of June 2024) and should be the same 
DOCKER_IMAGE=ghcr.io/oracle/adb-free:latest

# Docker container name
CONTAINER_NAME=adb-free

# TNS service name used by sqlplus and load-apex-app.sh.
# ADB-Free exposes: myatp_high | myatp_medium | myatp_low | myatp_tp | myatp_tpurgent
SERVICE_NAME=myatp_high

# Password for the ADMIN (DBA) account and wallet encryption
DEFAULT_PASSWORD=Welcome_MY_ATP_123

# Hostname for the container — added to /etc/hosts by setup script
HOSTNAME=myadb.local

# ─────────────────────────────────────────────
# APEX / ORDS
# ─────────────────────────────────────────────
# ORDS and APEX are pre-installed inside the adb-free container.
# APEX is served over HTTPS on port 8443 (self-signed cert — click through on first visit).
APEX_PORT=8443

# APEX workspace admin user created by load-apex-app.sh.
# APEX_PASSWORD defaults to DEFAULT_PASSWORD if left empty.
APEX_USER=TRACKER1
APEX_PASSWORD=

# ─────────────────────────────────────────────
# ORACLE INSTANT CLIENT — Linux x86_64 (Ubuntu)
# ─────────────────────────────────────────────
BASIC_ZIP=instantclient-basic-linux.x64-23.6.0.24.10.zip
SQLPLUS_ZIP=instantclient-sqlplus-linux.x64-23.6.0.24.10.zip
BASIC_URL=https://download.oracle.com/otn_software/linux/instantclient/2360000/instantclient-basic-linux.x64-23.6.0.24.10.zip
SQLPLUS_URL=https://download.oracle.com/otn_software/linux/instantclient/2360000/instantclient-sqlplus-linux.x64-23.6.0.24.10.zip
INSTANT_CLIENT=instantclient_23_6

# ─────────────────────────────────────────────
# ORACLE INSTANT CLIENT — macOS Apple Silicon (ARM64: M1/M2/M3/M4)
# ─────────────────────────────────────────────
BASIC_ZIP_MAC=instantclient-basic-macos.arm64-23.26.1.0.0.dmg
SQLPLUS_ZIP_MAC=instantclient-sqlplus-macos.arm64-23.26.1.0.0.dmg
BASIC_URL_MAC=https://download.oracle.com/otn_software/mac/instantclient/2326100/instantclient-basic-macos.arm64-23.26.1.0.0.dmg
SQLPLUS_URL_MAC=https://download.oracle.com/otn_software/mac/instantclient/2326100/instantclient-sqlplus-macos.arm64-23.26.1.0.0.dmg
INSTANT_CLIENT_MAC=instantclient_23_26

# ─────────────────────────────────────────────
# ONNX VECTOR EMBEDDING MODEL
# ─────────────────────────────────────────────
ONNX_MODEL_URL=https://adwc4pm.objectstorage.us-ashburn-1.oci.customer-oci.com/p/eLddQappgBJ7jNi6Guz9m9LOtYe2u8LWY19GfgU8flFK4N9YgP4kTlrE9Px3pE12/n/adwc4pm/b/OML-Resources/o/all_MiniLM_L12_v2.onnx

# ─────────────────────────────────────────────
# LLM CONFIGURATIONS
# Format: LLM_<STATIC_ID>=<url>|<model>|<type>
#   type = 'local'  → full credential + remote server setup (e.g. Ollama on host)
#   type = 'remote' → URL pre-supply only at install time (e.g. OCI inference)
# ─────────────────────────────────────────────
LLM_OLLAMA_LOCAL=http://host.docker.internal:11434|llama3.2:3b|local
LLM_OCI_GROK_BIG=https://inference.generativeai.us-chicago-1.oci.oraclecloud.com|meta.llama-3.3-70b-instruct|remote
LLM_META_LLAMA_33_70B_INSTRUCT=https://inference.generativeai.us-chicago-1.oci.oraclecloud.com|meta.llama-3.3-70b-instruct|remote

# ─────────────────────────────────────────────
# CONTAINER RUNTIME (macOS only — ignored on Linux)
# Only Colima is supported. If Docker Desktop, Rancher Desktop, or
# OrbStack is running the scripts will exit and ask you to shut it down.
# ─────────────────────────────────────────────
CONTAINER_RUNTIME=colima

# Colima VM sizing — only applied when starting a NEW Colima VM.
# If a VM already exists (e.g. started by mifos-gazelle), colima start reuses it and
# these values are ignored. Disk cannot be resized without: colima delete && colima start.
# With mifos-gazelle (~35GB) + Oracle (~20GB) recommend at least 100GB disk.
COLIMA_ARCH=x86_64         # x86_64 emulation for the amd64 Oracle image on Apple Silicon
COLIMA_VM_TYPE=vz          # Apple Virtualization Framework (faster; supports /dev/fuse)
COLIMA_VZ_ROSETTA=true     # Rosetta 2 x86_64 emulation within VZ
COLIMA_MEMORY=8            # GB RAM
COLIMA_DISK=100            # GB disk
