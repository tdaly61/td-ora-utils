# config.ini — Oracle ADB 26ai container configuration
# Place this file in the same directory as run-adb-26ai.sh and setup-for-adb-26ai.sh
# run-adb-26ai.sh generates .env from these values — do not edit .env directly

# ─────────────────────────────────────────────
# ORACLE CONTAINER REGISTRY
# Both images are gated behind licence agreements at https://container-registry.oracle.com
# Accept: Database → free   (for oracle-db)
#         Database → ords   (for ords / APEX)
# ─────────────────────────────────────────────
ORACLE_REGISTRY_USER=
ORACLE_REGISTRY_PASSWORD=

# ─────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────
# Docker image for the Oracle Database Free container.
# Use 'latest' for the current multi-arch build (supports both AMD64 and ARM64), or pin:
#   AMD64: container-registry.oracle.com/database/free:23.26.1.0-amd64
#   ARM64: container-registry.oracle.com/database/free:23.26.1.0-arm64
DOCKER_IMAGE=container-registry.oracle.com/database/free:latest

# Name for the Oracle DB Docker container
CONTAINER_NAME=oracle-db

# Pluggable database service name — used by SQLPlus, ORDS, and TNS config
SERVICE_NAME=FREEPDB1

# Password for built-in DB accounts: SYS, SYSTEM
# Also used as the default for APEX_PASSWORD (see below) if APEX_PASSWORD is left empty
# Change this for any shared or internet-accessible environment
DEFAULT_PASSWORD=Welcome_MY_ATP_123

# Hostname for the DB container — must resolve locally (added to /etc/hosts by setup script)
# Use a valid FQDN or a name that can be added to /etc/hosts on both server and client
HOSTNAME=fu8.local

# ─────────────────────────────────────────────
# APEX / ORDS
# ─────────────────────────────────────────────
# Host port for ORDS / APEX HTTP access. Change if 8080 is already in use.
# Remote access via SSH tunnel:
#   ssh -L <APEX_PORT>:localhost:<APEX_PORT> -L 5500:localhost:5500 -N ubuntu@<server-ip>
# Then open http://localhost:<APEX_PORT>/ords/apex in your browser.
APEX_PORT=8080

# Directory containing the unzipped APEX install files (from apex-latest.zip).
# Leave empty to use the default: $HOME/apex  (recommended — keeps large files out of the repo).
# Use an absolute path for a custom location, e.g. /data/apex
APEX_DIR=

# APEX workspace and admin user created by the setup scripts.
# APEX_USER becomes both the Oracle DB schema name and the APEX workspace/admin username.
# APEX_PASSWORD defaults to DEFAULT_PASSWORD if left empty.
APEX_USER=TRACKER1
APEX_PASSWORD=

# ─────────────────────────────────────────────
# ORACLE INSTANT CLIENT — Linux x86_64 (Ubuntu)
# Only update these when a newer Instant Client version is released.
# Download page: https://www.oracle.com/database/technologies/instant-client/linux-x86-64-downloads.html
# ─────────────────────────────────────────────
BASIC_ZIP=instantclient-basic-linux.x64-23.6.0.24.10.zip
SQLPLUS_ZIP=instantclient-sqlplus-linux.x64-23.6.0.24.10.zip
BASIC_URL=https://download.oracle.com/otn_software/linux/instantclient/2360000/instantclient-basic-linux.x64-23.6.0.24.10.zip
SQLPLUS_URL=https://download.oracle.com/otn_software/linux/instantclient/2360000/instantclient-sqlplus-linux.x64-23.6.0.24.10.zip
INSTANT_CLIENT=instantclient_23_6

# ─────────────────────────────────────────────
# ORACLE INSTANT CLIENT — macOS Apple Silicon (ARM64: M1/M2/M3/M4)
# macOS packages are DMG files installed via install_ic.sh inside the mounted volume.
# Permanent "always latest" links (no version pinning):
#   https://download.oracle.com/otn_software/mac/instantclient/instantclient-basic-macos-arm64.dmg
#   https://download.oracle.com/otn_software/mac/instantclient/instantclient-sqlplus-macos-arm64.dmg
# Version-pinned URLs below — update when a newer release appears on:
#   https://www.oracle.com/database/technologies/instant-client/macos-arm64-downloads.html
# ─────────────────────────────────────────────
BASIC_ZIP_MAC=instantclient-basic-macos.arm64-23.26.1.0.0.dmg
SQLPLUS_ZIP_MAC=instantclient-sqlplus-macos.arm64-23.26.1.0.0.dmg
BASIC_URL_MAC=https://download.oracle.com/otn_software/mac/instantclient/2326100/instantclient-basic-macos.arm64-23.26.1.0.0.dmg
SQLPLUS_URL_MAC=https://download.oracle.com/otn_software/mac/instantclient/2326100/instantclient-sqlplus-macos.arm64-23.26.1.0.0.dmg
INSTANT_CLIENT_MAC=instantclient_23_26

# ─────────────────────────────────────────────
# ONNX VECTOR EMBEDDING MODEL
# Only change if you want to use a different ONNX model
# ─────────────────────────────────────────────
ONNX_MODEL_URL=https://adwc4pm.objectstorage.us-ashburn-1.oci.customer-oci.com/p/eLddQappgBJ7jNi6Guz9m9LOtYe2u8LWY19GfgU8flFK4N9YgP4kTlrE9Px3pE12/n/adwc4pm/b/OML-Resources/o/all_MiniLM_L12_v2.onnx

# ─────────────────────────────────────────────
# LLM CONFIGURATIONS
# Unified config for all AI model endpoints (local and remote).
# Format: LLM_<STATIC_ID>=<url>|<model>|<type>
#   STATIC_ID — must match the APEX remote server static_id in your app export
#   url       — base URL for the service
#   model     — model name for generative AI calls
#   type      — 'local'  full credential + server setup (e.g. Ollama running on host)
#              — 'remote' URL pre-supply only at install time (e.g. OCI inference endpoints)
# ─────────────────────────────────────────────
LLM_OLLAMA_LOCAL=http://host.docker.internal:11434|llama3.2:3b|local
LLM_OCI_GROK_BIG=https://inference.generativeai.us-chicago-1.oci.oraclecloud.com|meta.llama-3.3-70b-instruct|remote
LLM_META_LLAMA_33_70B_INSTRUCT=https://inference.generativeai.us-chicago-1.oci.oraclecloud.com|meta.llama-3.3-70b-instruct|remote

# ─────────────────────────────────────────────
# CONTAINER RUNTIME (macOS only)
# Which Docker-compatible runtime to use on macOS:
#   rancher        — Rancher Desktop (~/.rd/bin/docker)  ← use if Rancher Desktop is installed
#   docker_desktop — Docker Desktop
#   orbstack       — OrbStack
#   auto           — detect: tries the active context first, then OrbStack → Docker Desktop → Rancher Desktop
# ─────────────────────────────────────────────
CONTAINER_RUNTIME=rancher
