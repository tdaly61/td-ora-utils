# All variables are sourced from .env (generated by run-adb-26ai.sh from config.ini).
# Do not edit .env by hand — edit config.ini instead.

services:
  oracle-db:
    image: ${DOCKER_IMAGE:-container-registry.oracle.com/database/free:latest}
    container_name: ${CONTAINER_NAME:-oracle-db}
    hostname: ${DB_HOSTNAME:-fu8.local}
    environment:
      - ORACLE_PWD=${ORACLE_PWD}
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - ${DB_DATA_DIR:-/home/ubuntu/db_data_dir}:/opt/oracle/oradata
      - ${APEX_DIR}:/opt/oracle/apex
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 30s
      timeout: 10s
      retries: 150

  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: ords
    environment:
      - DBHOST=oracle-db          # service name — docker compose DNS, not container_name
      - DBPORT=1521
      - DBSERVICENAME=${SERVICE_NAME:-FREEPDB1}
      - ORACLE_PWD=${ORACLE_PWD}  # used by ORDS to install itself as SYS
    ports:
      - "${APEX_PORT:-8080}:8080"
    volumes:
      - ./ords_config:/etc/ords/config   # persists ORDS config across restarts
      - ${APEX_DIR}:/opt/oracle/apex          # ORDS auto-installs APEX from here on first run
    depends_on:
      oracle-db:
        condition: service_healthy
